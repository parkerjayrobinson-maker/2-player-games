<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>3D Perspective Pixel Tennis (WebRTC)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.2/peerjs.min.js"></script>
    <style>
        body { background-color: #111; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: sans-serif; overflow: hidden; }
        canvas { background-color: #1a4f1a; border: 4px solid #fff; box-shadow: 0 15px 40px rgba(0, 0, 0, 0.9); }
        .container { text-align: center; }
    </style>
</head>
<body>

    <div class="container">
        <h2 id="status">3D Pixel Tennis Online</h2>
        <canvas id="gameCanvas" width="1000" height="800"></canvas>
    </div>

    <script>
        // Use PeerJS from the window global
        const Peer = window.Peer; 

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // --- GAME STATE ---
        let appState = "MENU"; 
        let peer = null;
        let conn = null;
        let isHost = false;
        let isClient = false;
        let myRoomId = "";
        let clientKeys = { left: false, right: false, swing: false };

        // Physics/Ball/Players (Condensed for brevity, same logic as before)
        let ballX = 500, ballY = 400, ballZ = 0, ballZV = 0;
        let ballSX = 0, ballSY = 0;
        let p1Points = 0, p2Points = 0;
        let gameState = 0; // 0: Serve, 1: Play
        let players = [];
        const keys = {};

        // --- INPUTS ---
        window.addEventListener("keydown", e => {
            keys[e.code] = true;
            if (appState === "MENU") {
                if (e.code === "Digit3") startHosting();
                if (e.code === "Digit4") joinGame();
            }
        });
        window.addEventListener("keyup", e => keys[e.code] = false);

        // --- NETWORKING ---
        function startHosting() {
            appState = "HOSTING";
            isHost = true;
            myRoomId = Math.random().toString(36).substring(2, 6).toUpperCase();
            
            // Create Peer with a specific ID
            peer = new Peer("tennis-" + myRoomId);
            
            peer.on('open', id => console.log("Room Created: " + myRoomId));
            peer.on('connection', connection => {
                conn = connection;
                conn.on('open', () => {
                    appState = "PLAY";
                    setupPlayers();
                    // Listen for client keys
                    conn.on('data', data => { if(data.type === 'keys') clientKeys = data.keys; });
                });
            });
            peer.on('error', err => {
                alert("ID Taken or Connection Error. Try refreshing.");
                console.error(err);
            });
        }

        function joinGame() {
            let code = prompt("Enter 4-letter Code:");
            if(!code) return;
            isClient = true;
            appState = "CONNECTING";
            peer = new Peer(); // Client gets a random ID
            
            peer.on('open', () => {
                conn = peer.connect("tennis-" + code.toUpperCase());
                conn.on('open', () => {
                    appState = "PLAY";
                    setupPlayers();
                    // Listen for host sync
                    conn.on('data', data => {
                        if(data.type === 'sync') syncFromServer(data.state);
                    });
                });
            });
        }

        function setupPlayers() {
            players = [
                { x: 450, y: 650, color: 'blue', isBottom: true },
                { x: 450, y: 150, color: 'red', isBottom: false }
            ];
        }

        function syncFromServer(s) {
            ballX = s.bx; ballY = s.by; ballZ = s.bz;
            players[0].x = s.p1x; players[1].x = s.p2x;
        }

        // --- CORE LOOP ---
        function update() {
            if (appState === "PLAY") {
                if (isHost) {
                    // Move Player 1 (Local)
                    if(keys['KeyA']) players[0].x -= 7;
                    if(keys['KeyD']) players[0].x += 7;
                    // Move Player 2 (From Client Keys)
                    if(clientKeys.left) players[1].x -= 7;
                    if(clientKeys.right) players[1].x += 7;

                    // Basic Ball Move
                    if(gameState === 0 && keys['Space']) gameState = 1;
                    if(gameState === 1) { ballY -= 5; }

                    // Send to client
                    if(conn && conn.open) {
                        conn.send({type:'sync', state:{bx:ballX, by:ballY, bz:ballZ, p1x:players[0].x, p2x:players[1].x}});
                    }
                } else if (isClient) {
                    // Send keys to host
                    if(conn && conn.open) {
                        conn.send({type:'keys', keys:{
                            left: keys['ArrowLeft'] || keys['KeyA'],
                            right: keys['ArrowRight'] || keys['KeyD'],
                            swing: keys['Space']
                        }});
                    }
                }
            }
            draw();
            requestAnimationFrame(update);
        }

        function draw() {
            ctx.fillStyle = '#1a4f1a';
            ctx.fillRect(0,0,1000,800);
            
            if (appState === "MENU") {
                ctx.fillStyle = "white"; ctx.textAlign = "center"; ctx.font = "30px Arial";
                ctx.fillText("Press 3 to HOST | Press 4 to JOIN", 500, 400);
            } else if (appState === "HOSTING") {
                ctx.fillText("ROOM CODE: " + myRoomId, 500, 400);
            } else if (appState === "PLAY") {
                players.forEach(p => {
                    ctx.fillStyle = p.color;
                    ctx.fillRect(p.x, p.y, 100, 20);
                });
                ctx.fillStyle = "yellow";
                ctx.beginPath(); ctx.arc(ballX, ballY, 10, 0, Math.PI*2); ctx.fill();
            }
        }

        update();
    </script>
</body>
</html>
