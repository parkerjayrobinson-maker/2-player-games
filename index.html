<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pixel Tennis Online</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #111; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: sans-serif; }
        canvas { background: #1a4f1a; border: 4px solid #fff; }
        #status { position: absolute; top: 10px; background: rgba(0,0,0,0.8); padding: 10px; border-radius: 5px; }
    </style>
</head>
<body>

    <div id="status">Loading PeerJS...</div>
    <canvas id="gameCanvas" width="800" height="600"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const statusEl = document.getElementById('status');

        let appState = "MENU";
        let peer = null;
        let conn = null;
        let isHost = false;
        
        // Game Objects
        let ball = { x: 400, y: 300, vx: 4, vy: 4 };
        let p1 = { x: 350, y: 550, w: 100, h: 15 };
        let p2 = { x: 350, y: 35, w: 100, h: 15 };
        let keys = {};
        let remoteKeys = { left: false, right: false };

        // Wait for PeerJS to load
        function init() {
            if (window.Peer) {
                statusEl.innerText = "Ready! [3] Host | [4] Join";
            } else {
                setTimeout(init, 500);
            }
        }
        init();

        window.addEventListener("keydown", e => {
            keys[e.code] = true;
            if (appState === "MENU") {
                if (e.code === "Digit3") startHosting();
                if (e.code === "Digit4") joinGame();
            }
        });
        window.addEventListener("keyup", e => keys[e.code] = false);

        function startHosting() {
            appState = "HOSTING";
            const code = Math.random().toString(36).substring(2, 6).toUpperCase();
            peer = new Peer("TENNIS-" + code);
            
            peer.on('open', id => { statusEl.innerText = "CODE: " + code; });
            peer.on('connection', c => {
                conn = c;
                conn.on('open', () => {
                    isHost = true; appState = "PLAY";
                    statusEl.innerText = "Playing as HOST";
                    conn.on('data', d => { if(d.type==='keys') remoteKeys = d.keys; });
                });
            });
        }

        function joinGame() {
            let input = prompt("Enter Code:");
            if (!input) return; // FIX: Prevents the 'toUpperCase' crash
            
            let code = "TENNIS-" + input.toUpperCase();
            appState = "CONNECTING";
            statusEl.innerText = "Connecting...";
            
            peer = new Peer();
            peer.on('open', () => {
                conn = peer.connect(code);
                conn.on('open', () => {
                    isHost = false; appState = "PLAY";
                    statusEl.innerText = "Playing as CLIENT";
                    conn.on('data', d => { if(d.type==='sync') { ball=d.b; p1.x=d.p1; p2.x=d.p2; }});
                });
            });
        }

        function update() {
            ctx.fillStyle = '#1a4f1a';
            ctx.fillRect(0, 0, 800, 600);

            if (appState === "MENU") {
                ctx.fillStyle = "white"; ctx.textAlign = "center"; ctx.font = "30px Arial";
                ctx.fillText("PIXEL TENNIS", 400, 300);
            } else if (appState === "PLAY") {
                if (isHost) {
                    if (keys['ArrowLeft']) p1.x -= 7; if (keys['ArrowRight']) p1.x += 7;
                    if (remoteKeys.left) p2.x -= 7; if (remoteKeys.right) p2.x += 7;
                    ball.x += ball.vx; ball.y += ball.vy;
                    if (ball.x < 0 || ball.x > 800) ball.vx *= -1;
                    if (ball.y > 540 && ball.x > p1.x && ball.x < p1.x + 100) ball.vy *= -1;
                    if (ball.y < 50 && ball.x > p2.x && ball.x < p2.x + 100) ball.vy *= -1;
                    if (ball.y < 0 || ball.y > 600) { ball.x = 400; ball.y = 300; }
                    if (conn && conn.open) conn.send({type:'sync', b:ball, p1:p1.x, p2:p2.x});
                } else {
                    if (conn && conn.open) conn.send({type:'keys', keys:{left:keys['ArrowLeft'], right:keys['ArrowRight']}});
                }
                ctx.fillStyle = "blue"; ctx.fillRect(p1.x, p1.y, p1.w, p1.h);
                ctx.fillStyle = "red"; ctx.fillRect(p2.x, p2.y, p2.w, p2.h);
                ctx.fillStyle = "yellow"; ctx.beginPath(); ctx.arc(ball.x, ball.y, 8, 0, Math.PI*2); ctx.fill();
            }
            requestAnimationFrame(update);
        }
        update();
    </script>
</body>
</html>
