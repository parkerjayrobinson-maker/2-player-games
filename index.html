<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>3D Pixel Tennis - Stable Build</title>
    <script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background-color: #111; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: 'Courier New', monospace; overflow: hidden; }
        canvas { background-color: #1a4f1a; border: 4px solid #fff; box-shadow: 0 0 40px #000; image-rendering: pixelated; }
        #ui { position: absolute; top: 10px; background: rgba(0,0,0,0.7); padding: 10px; border-radius: 5px; pointer-events: none; }
    </style>
</head>
<body>

    <div id="ui">Status: Waiting for Library...</div>
    <canvas id="gameCanvas" width="800" height="600"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const ui = document.getElementById('ui');

        // --- CORE VARIABLES ---
        let appState = "MENU";
        let peer = null;
        let conn = null;
        let isHost = false;
        let myRoomCode = "";

        // Game Objects
        let ball = { x: 400, y: 300, vx: 3, vy: 3 };
        let p1 = { x: 350, y: 550, w: 100, h: 15, color: '#00f' }; // Bottom
        let p2 = { x: 350, y: 35, w: 100, h: 15, color: '#f00' };  // Top
        let keys = {};
        let remoteInputs = { left: false, right: false };

        // PeerJS Configuration (Helps bypass firewall issues)
        const peerConfig = {
            config: {
                'iceServers': [
                    { url: 'stun:stun.l.google.com:19302' },
                    { url: 'stun:stun1.l.google.com:19302' }
                ]
            }
        };

        // --- INITIALIZATION ---
        function checkLibrary() {
            if (window.Peer) {
                ui.innerText = "Status: Ready. Press [3] to Host or [4] to Join.";
            } else {
                setTimeout(checkLibrary, 500);
            }
        }
        checkLibrary();

        window.addEventListener("keydown", e => {
            keys[e.code] = true;
            if (appState === "MENU") {
                if (e.code === "Digit3") startHosting();
                if (e.code === "Digit4") joinGame();
            }
        });
        window.addEventListener("keyup", e => keys[e.code] = false);

        // --- NETWORKING ---
        function startHosting() {
            if (!window.Peer) return;
            appState = "HOSTING";
            myRoomCode = Math.random().toString(36).substring(2, 6).toUpperCase();
            
            peer = new window.Peer("tennis-" + myRoomCode, peerConfig);
            
            peer.on('open', () => { ui.innerText = "Room Code: " + myRoomCode; });
            peer.on('connection', c => {
                conn = c;
                conn.on('open', () => {
                    appState = "PLAY";
                    isHost = true;
                    ui.innerText = "Connected! Playing as Host.";
                    conn.on('data', data => { if(data.type === 'input') remoteInputs = data.inputs; });
                });
            });
            peer.on('error', err => { alert("Error: " + err.type); location.reload(); });
        }

        function joinGame() {
            if (!window.Peer) return;
            let code = prompt("Enter Room Code:").toUpperCase();
            if (!code) return;

            appState = "CONNECTING";
            ui.innerText = "Connecting to " + code + "...";
            peer = new window.Peer(peerConfig);
            
            peer.on('open', () => {
                conn = peer.connect("tennis-" + code);
                conn.on('open', () => {
                    appState = "PLAY";
                    isHost = false;
                    ui.innerText = "Connected! Playing as Client.";
                    conn.on('data', data => {
                        if (data.type === 'sync') {
                            ball = data.ball;
                            p1.x = data.p1x;
                            p2.x = data.p2x;
                        }
                    });
                });
            });
            peer.on('error', err => { alert("Connection Failed. Check Code."); location.reload(); });
        }

        // --- MAIN LOOP ---
        function update() {
            ctx.fillStyle = '#1a4f1a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (appState === "MENU") {
                drawText("PIXEL TENNIS ONLINE", 400, 280, "30px", "#fff");
                drawText("3: HOST | 4: JOIN", 400, 330, "20px", "#ccc");
            } 
            else if (appState === "PLAY") {
                if (isHost) {
                    // Host Controls (Bottom Player)
                    if (keys['KeyA'] || keys['ArrowLeft']) p1.x -= 6;
                    if (keys['KeyD'] || keys['ArrowRight']) p1.x += 6;
                    
                    // Client Controls (Remote Top Player)
                    if (remoteInputs.left) p2.x -= 6;
                    if (remoteInputs.right) p2.x += 6;

                    // Ball Logic (Host Only)
                    ball.x += ball.vx;
                    ball.y += ball.vy;

                    // Walls
                    if (ball.x < 0 || ball.x > 800) ball.vx *= -1;
                    // Paddles
                    if (ball.y > 540 && ball.x > p1.x && ball.x < p1.x + 100) ball.vy *= -1;
                    if (ball.y < 50 && ball.x > p2.x && ball.x < p2.x + 100) ball.vy *= -1;
                    // Out of bounds
                    if (ball.y < 0 || ball.y > 600) { ball.x = 400; ball.y = 300; }

                    // Sync to Client
                    if (conn && conn.open) {
                        conn.send({ type: 'sync', ball: ball, p1x: p1.x, p2x: p2.x });
                    }
                } else {
                    // Client sends keys to Host
                    if (conn && conn.open) {
                        conn.send({ 
                            type: 'input', 
                            inputs: { 
                                left: keys['KeyA'] || keys['ArrowLeft'], 
                                right: keys['KeyD'] || keys['ArrowRight'] 
                            } 
                        });
                    }
                }

                // Render
                ctx.fillStyle = 'yellow';
                ctx.beginPath(); ctx.arc(ball.x, ball.y, 8, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = p1.color; ctx.fillRect(p1.x, p1.y, p1.w, p1.h);
                ctx.fillStyle = p2.color; ctx.fillRect(p2.x, p2.y, p2.w, p2.h);
            }

            requestAnimationFrame(update);
        }

        function drawText(t, x, y, s, c) {
            ctx.fillStyle = c; ctx.font = s + " 'Courier New'"; ctx.textAlign = "center";
            ctx.fillText(t, x, y);
        }

        update();
    </script>
</body>
</html>
