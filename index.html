<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Pixel Tennis Online</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body {
            background-color: #111;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
        }
        canvas {
            background-color: #1a4f1a;
            border: 4px solid #fff;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            image-rendering: pixelated;
        }
        .ui-overlay {
            position: absolute;
            top: 20px;
            background: rgba(0,0,0,0.5);
            padding: 10px;
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <div class="ui-overlay" id="networkStatus">Status: PeerJS Loading...</div>
    <canvas id="gameCanvas" width="800" height="600"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const statusEl = document.getElementById('networkStatus');

        // --- APP STATE ---
        let appState = "MENU"; 
        let peer = null;
        let conn = null;
        let isHost = false;
        let myRoomId = "";
        
        // --- GAME DATA ---
        let ball = { x: 400, y: 300, radius: 10 };
        let players = [
            { x: 350, y: 550, w: 100, h: 15, color: '#0077ff', score: 0 }, // Bottom (Host)
            { x: 350, y: 35, w: 100, h: 15, color: '#ff3300', score: 0 }    // Top (Client)
        ];
        let keys = {};
        let clientInputs = { left: false, right: false };

        // Listen for keys
        window.addEventListener("keydown", e => {
            keys[e.code] = true;
            if (appState === "MENU") {
                if (e.code === "Digit3") startHosting();
                if (e.code === "Digit4") joinGame();
            }
        });
        window.addEventListener("keyup", e => keys[e.code] = false);

        // --- PEERJS LOGIC ---
        function initPeerStatus() {
            if (window.Peer) {
                statusEl.innerText = "Status: Ready to Play";
            } else {
                setTimeout(initPeerStatus, 500);
            }
        }
        initPeerStatus();

        function startHosting() {
            if (!window.Peer) return alert("PeerJS not loaded yet!");
            
            appState = "HOSTING";
            myRoomId = Math.random().toString(36).substring(2, 6).toUpperCase();
            peer = new window.Peer("tennis-" + myRoomId);
            
            peer.on('open', id => {
                statusEl.innerText = "Hosting Room: " + myRoomId;
            });

            peer.on('connection', connection => {
                conn = connection;
                conn.on('open', () => {
                    appState = "PLAY";
                    isHost = true;
                    // Listen for Client movement
                    conn.on('data', data => {
                        if (data.type === 'input') clientInputs = data.inputs;
                    });
                });
            });
        }

        function joinGame() {
            if (!window.Peer) return alert("PeerJS not loaded yet!");
            
            let code = prompt("Enter 4-letter Room Code:").toUpperCase();
            if (!code) return;

            appState = "CONNECTING";
            peer = new window.Peer(); // Client gets random ID
            
            peer.on('open', () => {
                conn = peer.connect("tennis-" + code);
                conn.on('open', () => {
                    appState = "PLAY";
                    isHost = false;
                    statusEl.innerText = "Connected to Host";
                    // Listen for Host sync
                    conn.on('data', data => {
                        if (data.type === 'sync') {
                            ball = data.ball;
                            players = data.players;
                        }
                    });
                });
            });
        }

        // --- GAME LOOP ---
        function update() {
            ctx.fillStyle = '#1a4f1a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (appState === "MENU") {
                drawText("PIXEL TENNIS ONLINE", 400, 250, "40px", "white");
                drawText("PRESS [3] TO HOST", 400, 320, "20px", "#00ff00");
                drawText("PRESS [4] TO JOIN", 400, 360, "20px", "#ff00ff");
            } 
            else if (appState === "HOSTING") {
                drawText("WAITING FOR PLAYER 2...", 400, 280, "25px", "white");
                drawText("ROOM CODE: " + myRoomId, 400, 330, "35px", "yellow");
            }
            else if (appState === "CONNECTING") {
                drawText("CONNECTING TO HOST...", 400, 300, "25px", "white");
            }
            else if (appState === "PLAY") {
                if (isHost) {
                    // Logic for Host
                    if (keys['ArrowLeft'] || keys['KeyA']) players[0].x -= 7;
                    if (keys['ArrowRight'] || keys['KeyD']) players[0].x += 7;
                    
                    // Logic for Client (received via data)
                    if (clientInputs.left) players[1].x -= 7;
                    if (clientInputs.right) players[1].x += 7;

                    // Move Ball
                    ball.y -= 3;
                    if (ball.y < 0) ball.y = 600;

                    // Sync to Client
                    if (conn && conn.open) {
                        conn.send({ type: 'sync', ball: ball, players: players });
                    }
                } else {
                    // Client sends inputs to Host
                    if (conn && conn.open) {
                        conn.send({ 
                            type: 'input', 
                            inputs: { 
                                left: keys['ArrowLeft'] || keys['KeyA'], 
                                right: keys['ArrowRight'] || keys['KeyD'] 
                            } 
                        });
                    }
                }

                // Draw Ball
                ctx.fillStyle = 'yellow';
                ctx.beginPath();
                ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
                ctx.fill();

                // Draw Players
                players.forEach(p => {
                    ctx.fillStyle = p.color;
                    ctx.fillRect(p.x, p.y, p.w, p.h);
                });
            }

            requestAnimationFrame(update);
        }

        function drawText(txt, x, y, size, color) {
            ctx.fillStyle = color;
            ctx.font = size + " 'Courier New'";
            ctx.textAlign = "center";
            ctx.fillText(txt, x, y);
        }

        update();
    </script>
</body>
</html>
